name: GoldenAge AI
description: 智享银龄 — companion-driven, accessibility-first app for elderly users.
publish_to: 'none'
version: 0.5.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State + routing -------------------------------------------------
  provider: ^6.1.2
  go_router: ^14.2.7

  # --- Supabase --------------------------------------------------------
  supabase_flutter: ^2.5.6

  # --- UI / Accessibility ---------------------------------------------
  google_fonts: ^6.2.1
  haptic_feedback: ^0.5.1+1
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # --- Native bridges --------------------------------------------------
  geolocator: ^13.0.1
  flutter_local_notifications: ^17.2.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.3

  # --- Storage + networking -------------------------------------------
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2

  # --- RSS / feeds ----------------------------------------------------
  webfeed_plus: ^1.0.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_gen: ^5.4.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/soul/SOUL.md
